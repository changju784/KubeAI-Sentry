apiVersion: v1
kind: LimitRange
metadata:
  name: alpha-limitrange
  namespace: tenant-alpha
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "128Mi"
      defaultRequest:
        cpu: "100m"
        memory: "64Mi"
      max:
        cpu: "500m"
        memory: "256Mi"
      min:
        cpu: "10m"
        memory: "16Mi"
