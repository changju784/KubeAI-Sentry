apiVersion: v1
kind: LimitRange
metadata:
  name: beta-limitrange
  namespace: tenant-beta
spec:
  limits:
    - type: Container
      default:
        cpu: "400m"
        memory: "256Mi"
      defaultRequest:
        cpu: "200m"
        memory: "128Mi"
      max:
        cpu: "500m"
        memory: "512Mi"
      min:
        cpu: "10m"
        memory: "16Mi"
