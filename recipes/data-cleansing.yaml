apiVersion: kubeai-sentry/v1
kind: WorkloadRecipe
metadata:
  name: data-cleansing
spec:
  workload_type: data-cleansing
  tenant: tenant-beta
  replicas: 1
  priority_class: training-low
  resources:
    requests:
      cpu: "50m"
      memory: "40Mi"
    limits:
      cpu: "150m"
      memory: "96Mi"
  env:
    LOAD_PROFILE: steady
    MEMORY_TARGET_MB: "32"
    CPU_CORES: "0.1"
    DURATION_SECONDS: "3600"
