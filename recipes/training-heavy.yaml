apiVersion: kubeai-sentry/v1
kind: WorkloadRecipe
metadata:
  name: training-heavy
spec:
  workload_type: training
  tenant: tenant-beta
  replicas: 1
  priority_class: training-low
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  env:
    LOAD_PROFILE: burst
    MEMORY_TARGET_MB: "768"
    CPU_CORES: "0.8"
    DURATION_SECONDS: "3600"
