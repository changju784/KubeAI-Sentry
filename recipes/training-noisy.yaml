apiVersion: kubeai-sentry/v1
kind: WorkloadRecipe
metadata:
  name: training-noisy
spec:
  workload_type: training
  tenant: tenant-beta
  replicas: 1
  priority_class: training-low
  resources:
    requests:
      cpu: "200m"
      memory: "160Mi"
    limits:
      cpu: "400m"
      memory: "256Mi"
  env:
    LOAD_PROFILE: burst
    MEMORY_TARGET_MB: "300"    # exceeds 256Mi limit (~268MB) → triggers OOMKill
    CPU_CORES: "0.3"
    DURATION_SECONDS: "300"
