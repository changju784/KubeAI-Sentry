apiVersion: kubeai-sentry/v1
kind: WorkloadRecipe
metadata:
  name: inference-standard
spec:
  workload_type: inference
  tenant: tenant-alpha
  replicas: 1
  priority_class: inference-high
  resources:
    requests:
      cpu: "100m"
      memory: "80Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  env:
    LOAD_PROFILE: steady
    MEMORY_TARGET_MB: "64"
    CPU_CORES: "0.15"
    DURATION_SECONDS: "3600"
